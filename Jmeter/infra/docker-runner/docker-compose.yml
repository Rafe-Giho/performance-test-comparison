services:
  jmeter-runner:
    build:
      context: .
      args:
        JMETER_VERSION: ${JMETER_VERSION:-5.6.3}
    image: custom/jmeter-runner:${JMETER_VERSION:-5.6.3}
    environment:
      PLAN_PATH: /workspace/plans/${PLAN_FILE:-web-standard-template.jmx}
      PROJECT_NAME: ${PROJECT_NAME:?PROJECT_NAME is required}
      RESULT_PREFIX: ${RESULT_PREFIX:-jmeter}
      PROTOCOL: ${PROTOCOL:?PROTOCOL is required}
      HOST: ${HOST:?HOST is required}
      PORT: ${PORT:?PORT is required}
      THREADS: ${THREADS:?THREADS is required}
      RAMP_UP: ${RAMP_UP:?RAMP_UP is required}
      LOOPS: ${LOOPS:?LOOPS is required}
      THINK_TIME_MS: ${THINK_TIME_MS:?THINK_TIME_MS is required}
      HEALTH_PATH: ${HEALTH_PATH:?HEALTH_PATH is required}
      LOGIN_PATH: ${LOGIN_PATH:?LOGIN_PATH is required}
      LIST_PATH: ${LIST_PATH:?LIST_PATH is required}
      DETAIL_PATH: ${DETAIL_PATH:?DETAIL_PATH is required}
      EVENT_PATH: ${EVENT_PATH:?EVENT_PATH is required}
      EVENT_PAYLOAD: ${EVENT_PAYLOAD:?EVENT_PAYLOAD is required}
      USERNAME: ${USERNAME:?USERNAME is required}
      PASSWORD: ${PASSWORD:?PASSWORD is required}
    volumes:
      - ../../plans:/workspace/plans
      - ../../data:/workspace/data
      - ../../reports:/workspace/reports
