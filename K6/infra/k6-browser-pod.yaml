apiVersion: v1
kind: Pod
metadata:
  name: k6-browser-test
  namespace: k6-test
  labels:
    workload: k6-browser
    test.tool: k6
spec:
  restartPolicy: Never
  nodeSelector:
    workload: k6-browser
  containers:
    - name: k6
      image: grafana/k6:1.7.1-with-browser
      envFrom:
        - configMapRef:
            name: k6-runtime-config
      env:
        - name: K6_BROWSER_HEADLESS
          value: "true"
      command:
        - k6
      args:
        - run
        - /script/browser_smoke.js
      resources:
        requests:
          cpu: "4"
          memory: "8G"
        limits:
          cpu: "4"
          memory: "8G"
      volumeMounts:
        - name: script
          mountPath: /script/browser_smoke.js
          subPath: browser_smoke.js
  volumes:
    - name: script
      configMap:
        name: k6-browser-script
