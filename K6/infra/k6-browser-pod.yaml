apiVersion: v1
kind: Pod
metadata:
  name: k6-browser-test
  namespace: k6-test
spec:
  restartPolicy: Never
  containers:
    - name: k6
      # Replace this tag with a pinned project version before production use.
      image: grafana/k6:latest-with-browser
      command:
        - k6
      args:
        - run
        - /script/browser_smoke.js
      resources:
        requests:
          cpu: "4"
          memory: "8G"
        limits:
          cpu: "4"
          memory: "8G"
      volumeMounts:
        - name: script
          mountPath: /script/browser_smoke.js
          subPath: browser_smoke.js
  volumes:
    - name: script
      configMap:
        name: k6-browser-script

